name: Security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/security-scan.yml@854f2d650e52253b34fcf8f416198ef8bf82abdc # v0.4.0
    secrets: inherit

  gha-security:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/gha-security.yml@854f2d650e52253b34fcf8f416198ef8bf82abdc # v0.4.0
    secrets: inherit

  skill-audit:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/skill-audit.yml@854f2d650e52253b34fcf8f416198ef8bf82abdc # v0.4.0
    secrets: inherit

  sast:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/sast.yml@854f2d650e52253b34fcf8f416198ef8bf82abdc # v0.4.0
    secrets: inherit

  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      administration: read
    uses: garymike/security-workflows/.github/workflows/security-audit.yml@854f2d650e52253b34fcf8f416198ef8bf82abdc # v0.4.0
    secrets: inherit
