name: Security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/security-scan.yml@8a5a69ab1ef4903bb6f281f8318770012fa6167c # v1.6.0
    secrets: inherit

  gha-security:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/gha-security.yml@8a5a69ab1ef4903bb6f281f8318770012fa6167c # v1.6.0
    secrets: inherit

  skill-audit:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/skill-audit.yml@8a5a69ab1ef4903bb6f281f8318770012fa6167c # v1.6.0
    secrets: inherit

  sast:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/sast.yml@8a5a69ab1ef4903bb6f281f8318770012fa6167c # v1.6.0
    secrets: inherit

  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: garymike/security-workflows/.github/workflows/security-audit.yml@8a5a69ab1ef4903bb6f281f8318770012fa6167c # v1.6.0
    secrets: inherit
