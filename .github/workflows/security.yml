name: Security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/security-scan.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  gha-security:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/gha-security.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  skill-audit:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/skill-audit.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  sast:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/sast.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: garymike/security-workflows/.github/workflows/security-audit.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit
